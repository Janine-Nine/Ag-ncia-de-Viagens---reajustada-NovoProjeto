<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Agência de Viagens JTC</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, p, label, input, textarea, .nav-link, h2, h3, h4 {
            color: #fff !important;
        }
        footer h1, footer h4, footer p {
            color: purple !important;
        }
        #contato-form label {
            color: orange !important;
        }
    </style>
</head>
<body style="background: url('img brasil/litoral-br.jpg') center/cover no-repeat fixed; position: relative;">
    <div class="bg-overlay"></div>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg border-bottom mb-4" style="background: rgb(216, 17, 216);">
        <div class="container justify-content-center">
            <div class="collapse navbar-collapse show justify-content-center" id="navbarNav">
                <ul class="navbar-nav mx-auto flex-row gap-3">
                    <li class="nav-item"><a class="nav-link text-light active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="destinos nacionais.html">Destinos Nacionais</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="destinos internacionais.html">Destinos Internacionais</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="hospedagem.html">Hospedagem</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="pagamentos.html">Pagamentos</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="reserva.html">Reserva</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="contato.html">Contato</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container my-5">
        <h4 class="titulo-centralizado">Fale Conosco</h4>
        <p class="subtitulo-centralizado">Entre em contato para dúvidas, sugestões ou orçamentos!</p>
        <form id="contato-form" class="mx-auto" style="max-width: 500px;">
            <div class="mb-3">
                <label for="nome" class="form-label">Nome:</label>
                <input type="text" id="nome" name="nome" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">E-mail:</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="mensagem" class="form-label">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" class="form-control" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100">Enviar</button>
        </form>
        <div class="social-icons text-center mt-4">
            <a href="https://www.instagram.com/hurb" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.whatsapp.com/hurb" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="https://www.linkedin.com/hurb" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
            <a href="https://www.youtube.com/hurb" target="_blank"><i class="fa-brands fa-youtube"></i></a>
        </div>
    </section>

    <!-- Rodapé -->
    <footer>
    <h1 class="titulo-centralizado" style="color: #250a36 !important;">2025 Agência de Viagens. Todos os direitos reservados</h1>
    </footer>
    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
