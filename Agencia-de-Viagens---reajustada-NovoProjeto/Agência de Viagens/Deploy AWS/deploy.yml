name: Deploy Spring Boot

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build project
      run: mvn clean package -DskipTests

    - name: Build Docker image
      run: docker build -t agencia-viagens .

    - name: Deploy container
      run: |
        docker stop agencia || true
        docker rm agencia || true
        docker run -d -p 8080:8080 --name agencia agencia-viagens